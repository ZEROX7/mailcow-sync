name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install deps
      run: |
        pip install -r requirements.txt

    - name: Lint (basic)
      run: |
        pip install flake8
        flake8 . --max-line-length=120

    - name: Build Docker
      run: |
        docker build -t mailcow-sync .
